---
layout: default
title: Blog
---
<ul class="post-list">
  {% for post in site.posts %}
  <li class="post-item">
    <div class="post-meta">{{ post.date | date: "%Y-%m-%d" }}</div>
    <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
    {% if post.excerpt %}<p>{{ post.excerpt | strip_html | truncatewords: 30 }}</p>{% endif %}
  </li>
  {% endfor %}
</ul>
